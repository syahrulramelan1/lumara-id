services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # MobileApp — Next.js Storefront
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: web
    name: lumara-id-mobile
    runtime: node
    rootDir: MobileApp
    buildCommand: cp prisma/schema.production.prisma prisma/schema.prisma && npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Admin-Panel — React + Vite Static
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: web
    name: lumara-id-admin
    runtime: static
    rootDir: Admin-Panel
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
