</div>

</div>

<div class="mb-lg">

<p class="font-body-md text-on-surface-variant">Halo! Selamat datang kembali.</p>
</div>
<!-- Google Button -->
<button class="w-full flex items-center justify-center gap-sm py-sm px-md bg-surface-container-lowest border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors duration-200 mb-lg" type="button">

</div>

<form class="flex flex-col gap-md flex-1">

<div class="flex flex-col gap-base">
<label class="font-label-sm text-on-surface-variant tracking-wider uppercase" for="email">EMAIL</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-sm py-3 font-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-all" id="email" placeholder="Masukkan email anda" type="email" value="amara.putri@gmail.com"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-sm text-on-surface-variant tracking-wider uppercase" for="password">PASSWORD</label>
<a class="font-label-sm text-primary-container hover:text-primary transition-colors" href="#">Lupa Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-sm py-3 font-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-all pr-12" id="password" placeholder="Masukkan password anda" type="password" value="••••••••"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>

<div class="relative flex items-center">
<input checked="" class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-outline-variant bg-surface-container-lowest checked:border-primary-container checked:bg-primary-container transition-all" id="remember" type="checkbox"/>
<span class="material-symbols-outlined absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-white pointer-events-none opacity-0 peer-checked:opacity-100 text-[16px]" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<label class="ml-sm font-label-lg text-on-surface font-normal cursor-pointer" for="remember">Ingat saya selama 30 hari</label>
</div>

<div class="flex-grow"></div>

<div class="mt-auto flex flex-col gap-md">
<button class="w-full bg-primary-container text-on-primary font-label-lg py-4 rounded-xl shadow-[0_4px_12px_rgba(99,14,212,0.12)] hover:bg-[#7C3AED] hover:shadow-[0_6px_16px_rgba(99,14,212,0.2)] transition-all duration-200 active:scale-[0.98]" type="submit">
