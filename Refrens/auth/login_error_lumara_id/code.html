<h1 class="font-headline-md text-headline-md text-xl font-bold text-[#630ED4] tracking-widest uppercase">lumara-id</h1>

        </button>

<!-- Main Content Canvas -->
<main class="w-full max-w-md mx-auto mt-20 md:mt-24 flex-1 flex flex-col justify-center">
<!-- Header Text -->
<div class="mb-lg text-center">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please log in to continue your journey.</p>
</div>
<!-- Login Form -->
<form class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-sm">
<!-- Email Input (Error State) -->
<div class="flex flex-col gap-base">
<label class="font-label-lg text-label-lg text-on-surface" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-sm py-3 bg-[#FFF8F8] border-2 border-error rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-error focus:border-error transition-all" id="email" placeholder="Enter your email" type="email" value="user@example.com"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-error" data-icon="error" data-weight="fill" style="font-variation-settings: 'FILL' 1;">error</span>
</div>
<p class="font-label-sm text-label-sm text-error flex items-center gap-1 mt-1">
                    Email tidak terdaftar.
                </p>
</div>
<!-- Password Input (Normal State) -->
<div class="flex flex-col gap-base mt-sm">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary-container hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full px-sm py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" id="password" placeholder="Enter your password" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary-container transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" data-weight="regular">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2 mt-2">
<input class="w-4 h-4 text-primary-container bg-surface-container-low border-outline-variant rounded focus:ring-primary-container focus:ring-2" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant" for="remember">Remember me</label>
</div>
<!-- Submit Button -->
<button class="w-full mt-md py-3 bg-primary-container text-on-primary rounded-lg font-label-lg text-label-lg hover:bg-[#7C3AED] transition-colors shadow-[0_4px_12px_rgba(99,14,212,0.12)]" type="submit">

            </button>

<div class="relative flex items-center py-sm mt-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-on-surface-variant">or continue with</span>
