<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Filter Bottom Sheet</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#340042",
                        "on-tertiary-fixed": "#261900",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "primary-fixed": "#eaddff",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "outline": "#7b7487",
                        "surface-container-high": "#e2e8f8",
                        "on-secondary-container": "#753b83",
                        "secondary": "#824790",
                        "on-tertiary-container": "#f3b72c",
                        "primary-container": "#630ed4",
                        "surface": "#f9f9ff",
                        "tertiary-container": "#674a00",
                        "on-primary-fixed-variant": "#5a00c6",
                        "background": "#f9f9ff",
                        "inverse-primary": "#d2bbff",
                        "surface-variant": "#dce3f2",
                        "surface-container-highest": "#dce3f2",
                        "on-error-container": "#93000a",
                        "outline-variant": "#ccc3d8",
                        "on-surface-variant": "#4a4455",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#cdb4ff",
                        "on-background": "#151c27",
                        "surface-container": "#e7eefe",
                        "primary": "#4800a0",
                        "secondary-fixed-dim": "#f3aeff",
                        "secondary-container": "#f3aeff",
                        "surface-bright": "#f9f9ff",
                        "secondary-fixed": "#fcd7ff",
                        "surface-container-low": "#f0f3ff",
                        "inverse-surface": "#2a313c",
                        "surface-dim": "#d3daea",
                        "surface-tint": "#732ee4",
                        "inverse-on-surface": "#ebf1ff",
                        "on-secondary-fixed-variant": "#682f76",
                        "tertiary": "#4a3400",
                        "on-tertiary-fixed-variant": "#5d4200",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#fabd32",
                        "on-primary-fixed": "#25005a",
                        "tertiary-fixed": "#ffdea4",
                        "primary-fixed-dim": "#d2bbff",
                        "on-surface": "#151c27"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin": "32px",
                        "gutter": "24px",
                        "md": "24px",
                        "xl": "64px",
                        "lg": "40px",
                        "sm": "16px",
                        "base": "4px",
                        "xs": "8px"
                    },
                    "fontFamily": {
                        "body-md": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom scrollbar for webkit to keep it clean */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #dce3f2;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim flex justify-center items-center min-h-screen">
<!-- Mobile Device Simulator Container -->
<div class="w-[390px] h-[844px] bg-background relative overflow-hidden shadow-2xl rounded-[40px] border-[8px] border-inverse-surface">
<!-- Dummy Content Behind Overlay -->
<div class="p-md opacity-30 pointer-events-none">
<div class="h-16 w-full bg-surface-container-high rounded-xl mb-md"></div>
<div class="grid grid-cols-2 gap-sm">
<div class="h-48 bg-surface-container-high rounded-xl"></div>
<div class="h-48 bg-surface-container-high rounded-xl"></div>
<div class="h-48 bg-surface-container-high rounded-xl"></div>
<div class="h-48 bg-surface-container-high rounded-xl"></div>
</div>
</div>
<!-- Backdrop Overlay -->
<div class="absolute inset-0 bg-inverse-surface/40 backdrop-blur-[2px] z-40 transition-opacity"></div>
<!-- Bottom Sheet Container -->
<div class="absolute bottom-0 left-0 right-0 bg-surface rounded-t-[32px] z-50 flex flex-col h-[85%] shadow-[0_-8px_32px_rgba(99,14,212,0.12)] translate-y-0 transition-transform duration-300 ease-out">
<!-- Drag Handle Indicator -->
<div class="w-full flex justify-center pt-xs pb-2">
<div class="w-12 h-1 bg-outline-variant/50 rounded-full"></div>
</div>
<!-- Header -->
<div class="flex justify-between items-center px-md pb-sm border-b border-surface-container-high shrink-0">
<h2 class="font-headline-md text-headline-md text-on-surface">Filter</h2>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-md py-lg space-y-xl">
<!-- Category Section -->
<div class="space-y-sm">
<h3 class="font-label-lg text-label-lg text-on-surface">Kategori</h3>
<div class="flex flex-col gap-2">
<!-- Option 1 -->
<label class="flex items-center justify-between py-2 cursor-pointer group">
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Atasan</span>
<div class="w-5 h-5 rounded-full border border-outline-variant flex items-center justify-center group-hover:border-primary-container transition-colors"></div>
</label>
<!-- Option 2 (Selected) -->
<label class="flex items-center justify-between py-2 cursor-pointer group">
<span class="font-body-md text-body-md text-on-surface font-medium">Dress Modest</span>
<div class="w-5 h-5 rounded-full border-2 border-primary-container flex items-center justify-center">
<div class="w-2.5 h-2.5 bg-primary-container rounded-full"></div>
</div>
</label>
<!-- Option 3 -->
<label class="flex items-center justify-between py-2 cursor-pointer group">
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Bawahan</span>
<div class="w-5 h-5 rounded-full border border-outline-variant flex items-center justify-center group-hover:border-primary-container transition-colors"></div>
</label>
<!-- Option 4 -->
<label class="flex items-center justify-between py-2 cursor-pointer group">
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Hijab &amp; Pashmina</span>
<div class="w-5 h-5 rounded-full border border-outline-variant flex items-center justify-center group-hover:border-primary-container transition-colors"></div>
</label>
</div>
</div>
<!-- Price Range Section -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<h3 class="font-label-lg text-label-lg text-on-surface">Rentang Harga</h3>
<button class="font-label-sm text-label-sm text-primary-container hover:underline">Reset</button>
</div>
<div class="flex items-center gap-sm">
<!-- Min Price Input -->
<div class="flex-1 bg-surface-container-low border border-outline-variant rounded-xl p-3 flex flex-col focus-within:border-primary-container focus-within:bg-surface-container-lowest transition-colors">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1">Minimum</span>
<div class="flex items-center gap-2">
<span class="font-body-md text-body-md text-on-surface-variant">Rp</span>
<input class="bg-transparent w-full font-body-md text-body-md text-on-surface focus:outline-none placeholder:text-outline" placeholder="0" type="number"/>
</div>
</div>
<div class="w-4 h-[1px] bg-outline-variant shrink-0"></div>
<!-- Max Price Input -->
<div class="flex-1 bg-surface-container-low border border-outline-variant rounded-xl p-3 flex flex-col focus-within:border-primary-container focus-within:bg-surface-container-lowest transition-colors">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1">Maksimum</span>
<div class="flex items-center gap-2">
<span class="font-body-md text-body-md text-on-surface-variant">Rp</span>
<input class="bg-transparent w-full font-body-md text-body-md text-on-surface focus:outline-none placeholder:text-outline" placeholder="500.000" type="number" value="850000"/>
</div>
</div>
</div>
</div>
<!-- Size Section -->
<div class="space-y-sm pb-xl">
<h3 class="font-label-lg text-label-lg text-on-surface">Ukuran</h3>
<div class="flex flex-wrap gap-xs">
<button class="px-5 py-2.5 rounded-full border border-outline-variant text-on-surface-variant font-label-lg text-label-lg hover:border-primary-container hover:text-primary-container transition-colors">XS</button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant text-on-surface-variant font-label-lg text-label-lg hover:border-primary-container hover:text-primary-container transition-colors">S</button>
<!-- Selected Chip -->
<button class="px-5 py-2.5 rounded-full bg-secondary-container text-on-secondary-container font-label-lg text-label-lg border border-transparent shadow-[0_2px_8px_rgba(99,14,212,0.08)]">M</button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant text-on-surface-variant font-label-lg text-label-lg hover:border-primary-container hover:text-primary-container transition-colors">L</button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant text-on-surface-variant font-label-lg text-label-lg hover:border-primary-container hover:text-primary-container transition-colors">XL</button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant text-on-surface-variant font-label-lg text-label-lg hover:border-primary-container hover:text-primary-container transition-colors">All Size</button>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="p-md border-t border-surface-container-high bg-surface/90 backdrop-blur-md shrink-0">
<button class="w-full bg-primary-container text-surface-container-lowest py-4 rounded-xl font-label-lg text-label-lg flex items-center justify-center gap-2 shadow-[0_4px_16px_rgba(99,14,212,0.16)] active:scale-[0.98] transition-transform">
                    Terapkan Filter
                </button>
</div>
</div>
</div>
</body></html>
